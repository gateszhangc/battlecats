name: Build And Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "deploy/argocd/**"
      - "deploy/k8s/**"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: battlecats-release
  cancel-in-progress: true

env:
  IMAGE_REGISTRY: registry.144.91.77.245.sslip.io
  IMAGE_REPOSITORY: registry.144.91.77.245.sslip.io/battlecats
  KUSTOMIZATION_PATH: deploy/k8s/overlays/prod/kustomization.yaml

jobs:
  build-and-push:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Derive image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}

  update-kustomization-tag:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update image tag in kustomization
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          path = Path(os.environ["KUSTOMIZATION_PATH"])
          content = path.read_text()
          updated, count = re.subn(
              r"(newName:\s*registry\.144\.91\.77\.245\.sslip\.io/battlecats\s+newTag:\s*)(\S+)",
              lambda match: f"{match.group(1)}{os.environ['IMAGE_TAG']}",
              content,
              count=1,
          )
          if count != 1:
              raise SystemExit("failed to update battlecats image tag in kustomization.yaml")
          path.write_text(updated)
          PY

      - name: Commit updated kustomization
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${KUSTOMIZATION_PATH}"
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: release battlecats ${IMAGE_TAG} [skip ci]"
          git push origin HEAD:main
