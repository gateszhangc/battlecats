apiVersion: apps/v1
kind: Deployment
metadata:
  name: battlecats
  labels:
    app.kubernetes.io/name: battlecats
    app.kubernetes.io/part-of: battlecats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: battlecats
      app.kubernetes.io/part-of: battlecats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: battlecats
        app.kubernetes.io/part-of: battlecats
    spec:
      imagePullSecrets:
        - name: battlecats-registry
      containers:
        - name: web
          image: battlecats:bootstrap
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
            - name: PRIMARY_HOST
              value: battlecats.lol
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /healthz
              port: 3000
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
